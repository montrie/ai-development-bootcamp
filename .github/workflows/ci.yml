name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./apps/frontend
        run: npm ci

      - name: Run ESLint
        working-directory: ./apps/frontend
        run: npm run lint

  backend-test:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 26
        uses: actions/setup-java@v4
        with:
          java-version: "26"
          distribution: "temurin"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('apps/backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Run backend tests
        run: mvn -f apps/backend/pom.xml --no-transfer-progress test

  frontend-unit-test:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/frontend

      - name: Run Vitest unit tests
        run: npm run test:unit
        working-directory: apps/frontend

  e2e-test:
    needs: [backend-test, frontend-unit-test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images with layer caching
        run: |
          docker buildx bake -f compose.yml backend e2e-test \
            --set "*.cache-from=type=gha" \
            --set "*.cache-to=type=gha,mode=max" \
            --load
        env:
          POSTGRES_DB: todo_db
          POSTGRES_USER: todo_app_user
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_DB_PASSWORD }}

      - name: Run E2E tests
        run: docker compose run --rm e2e-test
        env:
          POSTGRES_DB: todo_db
          POSTGRES_USER: todo_app_user
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_DB_PASSWORD }}

      - name: Stop Docker services
        if: always()
        run: docker compose down -v
        env:
          POSTGRES_DB: todo_db
          POSTGRES_USER: todo_app_user
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_DB_PASSWORD }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 7
