name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./apps/frontend
        run: npm ci

      - name: Run ESLint
        working-directory: ./apps/frontend
        run: npm run lint

  backend-test:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend-test image with layer caching
        run: |
          docker buildx bake -f compose.yml backend-test \
            --set "*.cache-from=type=gha" \
            --set "*.cache-to=type=gha,mode=max" \
            --load

      - name: Run backend tests
        run: docker compose run --rm backend-test

  frontend-unit-test:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend-unit-test image with layer caching
        run: |
          docker buildx bake -f compose.yml frontend-unit-test \
            --set "*.cache-from=type=gha" \
            --set "*.cache-to=type=gha,mode=max" \
            --load

      - name: Run frontend unit tests
        run: docker compose run --rm frontend-unit-test

  e2e-test:
    needs: [backend-test, frontend-unit-test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images with layer caching
        run: |
          docker buildx bake -f compose.yml backend e2e-test \
            --set "*.cache-from=type=gha" \
            --set "*.cache-to=type=gha,mode=max" \
            --load
        env:
          POSTGRES_DB: todo_db
          POSTGRES_USER: todo_app_user
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_DB_PASSWORD }}

      - name: Run E2E tests
        run: docker compose run --rm e2e-test
        env:
          POSTGRES_DB: todo_db
          POSTGRES_USER: todo_app_user
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_DB_PASSWORD }}

      - name: Stop Docker services
        if: always()
        run: docker compose down -v
        env:
          POSTGRES_DB: todo_db
          POSTGRES_USER: todo_app_user
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_DB_PASSWORD }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
