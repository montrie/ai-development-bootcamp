name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    branches:
      - main
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_sticky_comment: true
          claude_args: '--allowedTools Bash(gh pr *)'
          prompt: |
            You are reviewing a pull request for a ToDo application.
            Fetch the diff with: gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }}

            Check only the following:
            1. **Test coverage** — new behaviour must include all three layers: JUnit 5 (backend), Vitest (frontend), Playwright+Gherkin (E2E). Flag any missing layer as a bug.
            2. **Test file naming** — test files must be prefixed with the version number (e.g. `v2_`).
            3. **Naming conventions** — camelCase for JS/TS/Java variables and methods; PascalCase for React components and Java classes; kebab-case for CSS classes and HTML IDs.
            4. **V2 structure** — all V2 code must live under `apps/frontend/` or `apps/backend/`; E2E tests under `bdd/`.
            5. **REST API contract** — endpoints must match: GET/POST `/api/todos`, PATCH/DELETE `/api/todos/{id}`, DELETE `/api/todos`.
            6. **Obvious bugs** — TypeScript type errors, unhandled nulls, logic mistakes.

            Then post a comment using:
              gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "<summary>"

            Use this exact structure:
            ## Claude Review Summary

            **What this PR does:** <1-2 sentence description>

            **Findings:**
            - List each issue found (severity: bug/warning/suggestion)
            - Or "No significant issues found" if clean

            **Verdict:** <Approved / Changes requested / Needs discussion>

