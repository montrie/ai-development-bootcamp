services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: apps/backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat /dev/null > /dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: apps/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    environment:
      BACKEND_URL: http://backend:8080
      VITE_HOST: "true"
      VITE_POLLING: "true"
    depends_on:
      - backend

  backend-test:
    profiles: [test]
    build:
      context: apps/backend
      target: build
    # src/ is mounted so new/changed source files are picked up without rebuilding the image.
    # target/ is intentionally NOT mounted — the container compiles to its own ephemeral
    # filesystem, avoiding stale .class files from previous host builds.
    #
    # /var/run/docker.sock is mounted so Testcontainers (V7 integration tests) can spawn
    # sibling containers on the host's Docker daemon — Docker-out-of-Docker (DooD), not
    # Docker-in-Docker. Without this mount, V7*Test fails with
    # "Could not find a valid Docker environment".
    volumes:
      - ./apps/backend/src:/app/src
      - /var/run/docker.sock:/var/run/docker.sock
    # Sibling containers spawned by Testcontainers publish their ports on the host's docker0
    # bridge, not inside this container. TESTCONTAINERS_HOST_OVERRIDE tells Testcontainers to
    # connect via host.docker.internal, which extra_hosts maps to the host gateway on Linux
    # GHA runners (and is already resolvable on Docker Desktop).
    environment:
      TESTCONTAINERS_HOST_OVERRIDE: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: mvn clean test

  frontend-unit-test:
    profiles: [test]
    build:
      context: apps/frontend
      dockerfile: Dockerfile
    command: npm run test:unit
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules

  e2e-test:
    profiles: [test]
    build:
      context: .
      dockerfile: Dockerfile.e2e
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/frontend/node_modules
    environment:
      BACKEND_URL: http://backend:8080
      VITE_HOST: "true"
      CI: "true"
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      backend:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

volumes:
  postgres_data:
  pgadmin_data:
