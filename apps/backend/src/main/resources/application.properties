spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/todo_db
spring.datasource.username=todo_app_user
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:todo_app_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.main.banner-mode=off

logging.level.root=ERROR

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=${JWT_SECRET:dev-secret-must-be-at-least-32-chars!!}
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin}
